<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MitchWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0e0d; --paper: #f5f0e8; --accent: #d94f2b;
    --yes: #2a7d4f; --no: #c0392b; --muted: #7a7268;
    --border: #d4cfc4; --card: #faf7f2;
  }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); overflow: hidden; }

  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease; transform: translateY(24px);
  }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }
  .screen.exit { opacity: 0; transform: translateY(-24px); }

  .masthead { text-align: center; margin-bottom: 2rem; }
  .masthead-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .masthead h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 10vw, 88px); letter-spacing: 0.04em; line-height: 0.9; color: var(--ink); }
  .masthead h1 span { color: var(--accent); }
  .masthead-sub { font-size: 14px; color: var(--muted); margin-top: 8px; font-weight: 300; }

  .vote-pair { display: flex; gap: 14px; width: 100%; max-width: 420px; }
  .vote-btn { flex: 1; padding: 0; background: none; cursor: pointer; border: 1.5px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.2s, transform 0.15s; }
  .vote-btn:hover { transform: translateY(-2px); }
  .vote-btn:active { transform: translateY(0) scale(0.98); }
  .vote-btn-inner { padding: 24px 16px 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .vote-btn .label { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 0.06em; line-height: 1; transition: color 0.2s; }
  .vote-btn .sublabel { font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .vote-btn.yes:hover { border-color: var(--yes); }
  .vote-btn.yes:hover .label { color: var(--yes); }
  .vote-btn.no:hover { border-color: var(--no); }
  .vote-btn.no:hover .label { color: var(--no); }
  .vote-note { margin-top: 1rem; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: 0.06em; text-align: center; }

  .voted-badge { display: inline-block; padding: 5px 14px; border-radius: 999px; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .voted-badge.yes { background: #e6f4ed; color: var(--yes); }
  .voted-badge.no { background: #faeaea; color: var(--no); }

  .results-wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; }

  .prev-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; margin-bottom: 18px; display: flex; align-items: flex-start; gap: 12px; }
  .prev-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .prev-dot.yes { background: var(--yes); }
  .prev-dot.no { background: var(--no); }
  .prev-dot.tbd { background: var(--muted); }
  .prev-text { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .prev-text strong { color: var(--ink); font-weight: 500; }
  .prev-crowd { font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 3px; letter-spacing: 0.04em; }
  .prev-crowd.correct { color: var(--yes); }
  .prev-crowd.wrong { color: var(--no); }
  .prev-crowd.tbd { color: var(--muted); }

  .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; margin-bottom: 12px; }
  .bar-block { margin-bottom: 14px; }
  .bar-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .bar-label { font-size: 12px; font-weight: 500; }
  .bar-label.yes { color: var(--yes); }
  .bar-label.no { color: var(--no); }
  .bar-stat { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .bar-track { height: 7px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1); width: 0%; }
  .bar-fill.yes { background: var(--yes); }
  .bar-fill.no { background: var(--no); }

  .verdict { margin-top: 14px; padding: 12px 16px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
  .verdict-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .verdict-value { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.06em; }
  .verdict-value.yes { color: var(--yes); }
  .verdict-value.no { color: var(--no); }
  .verdict-value.tie { color: var(--muted); }

  .results-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .total-note { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  .refresh-btn { display: flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); transition: border-color 0.15s, color 0.15s; }
  .refresh-btn:hover { border-color: var(--ink); color: var(--ink); }
  .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .back-btn { margin-top: 1rem; background: none; border: none; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  .back-btn:hover { color: var(--ink); }

  .dead-wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
  .countdown-block { text-align: center; margin-bottom: 2rem; }
  .countdown-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .countdown-time { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 14vw, 96px); letter-spacing: 0.04em; line-height: 1; color: var(--ink); }
  .countdown-sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

  .ptr { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 8px; height: 0; overflow: hidden; background: var(--paper); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); transition: height 0.2s; }
  .ptr.visible { height: 44px; }

  .ticker { position: fixed; bottom: 0; left: 0; right: 0; height: 30px; overflow: hidden; border-top: 1px solid var(--border); background: var(--paper); display: flex; align-items: center; }
  .ticker-inner { display: flex; white-space: nowrap; animation: tick 22s linear infinite; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .ticker-inner span { padding: 0 22px; }
  @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .dot-sep { color: var(--border); }
</style>
</head>
<body>

<div class="ptr" id="ptr">
  <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
    <path d="M7 1v3M7 1L5 3M7 1l2 2M13 7a6 6 0 11-6-6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
  <span id="ptr-label">Pull to refresh</span>
</div>

<!-- VOTE SCREEN -->
<div class="screen active" id="screen-vote">
  <div class="masthead">
    <p class="masthead-eyebrow">Daily office forecast</p>
    <h1>Mitch<span>Watch</span></h1>
    <p class="masthead-sub" id="vote-question"></p>
  </div>
  <div id="pre-vote">
    <div class="vote-pair">
      <button class="vote-btn yes" onclick="castVote('yes')">
        <div class="vote-btn-inner">
          <span class="label">Yes</span>
          <span class="sublabel">He'll be here</span>
        </div>
      </button>
      <button class="vote-btn no" onclick="castVote('no')">
        <div class="vote-btn-inner">
          <span class="label">No</span>
          <span class="sublabel">Ghost mode</span>
        </div>
      </button>
    </div>
    <p class="vote-note">one vote per device · voting closes 3am ET</p>
  </div>
  <div id="already-voted" style="display:none; text-align:center;">
    <span class="voted-badge" id="voted-badge-label"></span>
    <p style="font-size:14px; color:var(--muted); font-weight:300; margin-bottom:1.25rem;">Your vote is in.</p>
    <button class="back-btn" onclick="showResults()">→ see current odds</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="screen-results">
  <div class="results-wrap">
    <div class="prev-card" id="prev-card" style="display:none;">
      <div class="prev-dot tbd" id="prev-dot"></div>
      <div>
        <p class="prev-text" id="prev-text"></p>
        <p class="prev-crowd tbd" id="prev-crowd"></p>
      </div>
    </div>

    <p class="section-label" id="results-heading">Current odds</p>

    <div class="bar-block">
      <div class="bar-row">
        <span class="bar-label yes">Yes — he'll show</span>
        <span class="bar-stat" id="yes-stat">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill yes" id="bar-yes"></div></div>
    </div>
    <div class="bar-block">
      <div class="bar-row">
        <span class="bar-label no">No — ghost mode</span>
        <span class="bar-stat" id="no-stat">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill no" id="bar-no"></div></div>
    </div>

    <div class="verdict">
      <div>
        <p class="verdict-label">Crowd verdict</p>
        <p class="verdict-value tie" id="verdict-value">—</p>
      </div>
    </div>

    <div class="results-footer">
      <p class="total-note" id="total-note">—</p>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshResults()">
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none">
          <path d="M11.5 6.5a5 5 0 11-5-5c1.5 0 2.8.6 3.8 1.6L12 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 3h3V0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Refresh
      </button>
    </div>
    <button class="back-btn" onclick="goBack()">← back</button>
  </div>
</div>

<!-- DEAD WINDOW SCREEN -->
<div class="screen" id="screen-dead">
  <div class="dead-wrap">
    <div class="countdown-block">
      <p class="countdown-label">Voting reopens in</p>
      <p class="countdown-time" id="countdown">00:00:00</p>
      <p class="countdown-sub">Polls open at noon ET</p>
    </div>
    <div id="dead-prev" style="width:100%;"></div>
  </div>
</div>

<div class="ticker">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<script>
let pollData = null;
let isRefreshing = false;
let countdownInterval = null;

function todayKey(pollDate) { return 'mitchvote_' + pollDate; }
function getMyVote(pollDate) { return localStorage.getItem(todayKey(pollDate)); }
function setMyVote(pollDate, choice) { localStorage.setItem(todayKey(pollDate), choice); }

async function loadPoll() {
  const r = await fetch('/api/poll');
  pollData = await r.json();
}

function pct(a, b) { const t = +a + +b; return t === 0 ? 0 : Math.round(+a / t * 100); }

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function renderPrevCard(poll) {
  const card = document.getElementById('prev-card');
  if (!poll) { card.style.display = 'none'; return; }
  card.style.display = 'flex';
  const yes = +poll.yes_votes, no = +poll.no_votes, total = yes + no;
  const yp = pct(yes, no);
  const dot = document.getElementById('prev-dot');
  const txt = document.getElementById('prev-text');
  const crowd = document.getElementById('prev-crowd');
  const crowdSays = yes > no ? 'yes' : no > yes ? 'no' : 'tie';
  const dateStr = fmtDate(poll.poll_date);

  if (poll.outcome === 'yes') { dot.className = 'prev-dot yes'; txt.innerHTML = '<strong>' + dateStr + '</strong> — Mitch came in.'; }
  else if (poll.outcome === 'no') { dot.className = 'prev-dot no'; txt.innerHTML = '<strong>' + dateStr + '</strong> — Mitch was a no-show.'; }
  else { dot.className = 'prev-dot tbd'; txt.innerHTML = '<strong>' + dateStr + '</strong> — outcome pending.'; }

  if (poll.outcome && poll.outcome !== 'tbd') {
    if (total === 0) { crowd.textContent = 'No votes were cast.'; crowd.className = 'prev-crowd tbd'; }
    else if (crowdSays === 'tie') { crowd.textContent = yp + '% yes · ' + total + ' votes — it was a tie.'; crowd.className = 'prev-crowd tbd'; }
    else {
      const correct = poll.outcome === crowdSays;
      crowd.textContent = yp + '% voted yes · ' + total + ' votes' + (correct ? ' · Crowd was right!' : ' · Crowd was wrong.');
      crowd.className = 'prev-crowd ' + (correct ? 'correct' : 'wrong');
    }
  } else {
    crowd.textContent = total === 0 ? 'No votes yet.' : yp + '% yes · ' + total + ' votes';
    crowd.className = 'prev-crowd tbd';
  }
}

function renderResults() {
  if (!pollData) return;
  const c = pollData.current;
  const yes = c ? +c.yes_votes : 0;
  const no = c ? +c.no_votes : 0;
  const total = yes + no;
  const yp = pct(yes, no);
  const np = pct(no, yes);

  document.getElementById('results-heading').textContent = 'Odds for ' + fmtDate(pollData.pollDate);
  document.getElementById('yes-stat').textContent = yes + ' vote' + (yes !== 1 ? 's' : '') + ' · ' + yp + '%';
  document.getElementById('no-stat').textContent = no + ' vote' + (no !== 1 ? 's' : '') + ' · ' + np + '%';
  document.getElementById('total-note').textContent = total + ' vote' + (total !== 1 ? 's' : '') + ' cast';

  setTimeout(() => {
    document.getElementById('bar-yes').style.width = yp + '%';
    document.getElementById('bar-no').style.width = np + '%';
  }, 80);

  const vv = document.getElementById('verdict-value');
  if (total === 0) { vv.textContent = '—'; vv.className = 'verdict-value tie'; }
  else if (yes > no) { vv.textContent = 'Probably yes'; vv.className = 'verdict-value yes'; }
  else if (no > yes) { vv.textContent = 'Probably not'; vv.className = 'verdict-value no'; }
  else { vv.textContent = 'Dead tie'; vv.className = 'verdict-value tie'; }

  renderPrevCard(pollData.lastArchived);
}

function renderDeadWindow() {
  if (!pollData) return;
  const deadPrev = document.getElementById('dead-prev');
  const p = pollData.lastArchived;
  if (p) {
    const yes = +p.yes_votes, no = +p.no_votes, total = yes + no;
    const yp = pct(yes, no);
    const crowdSays = yes > no ? 'yes' : no > yes ? 'no' : 'tie';
    const dateStr = fmtDate(p.poll_date);
    let outcomeText, dotClass;
    if (p.outcome === 'yes') { outcomeText = 'Mitch came in.'; dotClass = 'yes'; }
    else if (p.outcome === 'no') { outcomeText = 'Mitch was a no-show.'; dotClass = 'no'; }
    else { outcomeText = 'Outcome pending.'; dotClass = 'tbd'; }
    let crowdText, crowdClass;
    if (total === 0) { crowdText = 'No votes were cast.'; crowdClass = 'tbd'; }
    else if (p.outcome && p.outcome !== 'tbd') {
      const correct = p.outcome === crowdSays;
      crowdText = yp + '% voted yes · ' + total + ' votes' + (correct ? ' · Crowd was right!' : ' · Crowd was wrong.');
      crowdClass = correct ? 'correct' : 'wrong';
    } else { crowdText = yp + '% yes · ' + total + ' votes'; crowdClass = 'tbd'; }

    deadPrev.innerHTML = `<div class="prev-card">
      <div class="prev-dot ${dotClass}"></div>
      <div>
        <p class="prev-text"><strong>${dateStr}</strong> — ${outcomeText}</p>
        <p class="prev-crowd ${crowdClass}">${crowdText}</p>
      </div>
    </div>`;
  } else {
    deadPrev.innerHTML = '<p style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);text-align:center;">No previous results yet.</p>';
  }
  startCountdown(pollData.nextNoonUTC);
}

function startCountdown(nextNoonUTC) {
  if (countdownInterval) clearInterval(countdownInterval);
  const target = new Date(nextNoonUTC).getTime();
  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) { location.reload(); return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('countdown').textContent =
      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

function updateTicker() {
  const base = ['MITCHWATCH', "WILL HE OR WON'T HE", 'VOTE BY 3AM ET', 'OPENS NOON ET DAILY'];
  const c = pollData && pollData.current;
  if (c) {
    const yes = +c.yes_votes, no = +c.no_votes, total = yes + no;
    if (total > 0) { base.push(total + ' VOTES CAST'); base.push('YES ' + pct(yes,no) + '% · NO ' + pct(no,yes) + '%'); }
  }
  const items = [...base,...base].map(s => '<span>' + s + ' <span class="dot-sep">·</span></span>').join('');
  document.getElementById('ticker-inner').innerHTML = items;
}

async function refreshResults() {
  if (isRefreshing) return;
  isRefreshing = true;
  document.getElementById('refresh-btn').classList.add('spinning');
  try { await loadPoll(); renderResults(); updateTicker(); } catch(e) {}
  document.getElementById('refresh-btn').classList.remove('spinning');
  isRefreshing = false;
}

let touchStartY = 0, pulling = false;
const ptr = document.getElementById('ptr');
const ptrLabel = document.getElementById('ptr-label');
document.addEventListener('touchstart', e => {
  const active = document.querySelector('.screen.active');
  if (active && (active.id === 'screen-results' || active.id === 'screen-dead')) {
    touchStartY = e.touches[0].clientY; pulling = true;
  }
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!pulling) return;
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 30) { ptr.classList.add('visible'); ptrLabel.textContent = dy > 80 ? 'Release to refresh' : 'Pull to refresh'; }
  else ptr.classList.remove('visible');
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!pulling) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  pulling = false; ptr.classList.remove('visible');
  if (dy > 80) location.reload();
});

async function castVote(choice) {
  try {
    const r = await fetch('/api/vote', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ choice }) });
    const data = await r.json();
    if (data.success) {
      setMyVote(pollData.pollDate, choice);
      if (data.current) pollData.current = data.current;
      transitionTo('screen-vote', 'screen-results');
      renderResults();
    } else if (data.alreadyVoted) {
      showAlreadyVoted(choice);
    }
  } catch(e) { console.error(e); }
}

function showAlreadyVoted(choice) {
  document.getElementById('pre-vote').style.display = 'none';
  document.getElementById('already-voted').style.display = 'block';
  const badge = document.getElementById('voted-badge-label');
  badge.textContent = 'You voted: ' + (choice === 'yes' ? 'Yes' : 'No');
  badge.className = 'voted-badge ' + choice;
}

function showResults() { transitionTo('screen-vote', 'screen-results'); renderResults(); }
function goBack() { if (pollData && pollData.votingOpen) transitionTo('screen-results', 'screen-vote'); }

function transitionTo(fromId, toId) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);
  from.classList.add('exit');
  setTimeout(() => { from.classList.remove('active','exit'); to.classList.add('active'); }, 480);
}

async function init() {
  await loadPoll();
  updateTicker();

  if (pollData.deadWindow) {
    transitionTo('screen-vote', 'screen-dead');
    renderDeadWindow();
    return;
  }

  const pollDate = pollData.pollDate;
  const myVote = getMyVote(pollDate);
  document.getElementById('vote-question').textContent = 'Will Mitch work on ' + fmtDate(pollDate) + '?';

  if (myVote) {
    showAlreadyVoted(myVote);
    setTimeout(() => { transitionTo('screen-vote', 'screen-results'); renderResults(); }, 400);
  }
}

init();
</script>
</body>
</html>
